databases:
  - name: soma-db
    plan: free
    databaseName: soma_db
    user: soma_user

services:
  - type: web
    name: soma-fitness
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soma-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
